name: "Estrutura de diretorios e Arquivos"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: "18"

jobs:
  demonstrando_estrutura:
    name: "Demonstrar estrutura Básica"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Mostrar estrutura .github/workflows
        run: |
          echo "== Estrutura de diretórios e arquivos .github/workflows =="
          ls -la .github/workflows
          echo ""
          echo "Total de workflows: $(ls -1 .github/workflows | wc -l)"

      - name: Elementos obrigatórios do workflow
        run: |
          echo "== Elementos obrigatórios =="
          echo "1. name: Nome do workflow"
          echo "2. on: Evento que dispara o workflow"
          echo "3. jobs: Definição dos trabalhos"
          echo "4. runs-on: Ambiente de execução"
          echo "5. steps: Passos do job"
          echo ""
          echo "Total de elementos obrigatórios: 5"

      - name: Variáveis e contexto
        run: |
          echo "== Variáveis e Contexto =="
          echo "Variável env: ${{ env.NODE_VERSION }}"
          echo "1. env: Definição de variáveis de ambiente"
          echo "2. contextos: Acesso às informações do workflow"
          echo ""
          echo "Total de variáveis e contextos: 2"