name: "Estrutura de diretorios e Arquivos"

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  NODE_VERSION: '18'

jobs:
  demonstrando-Estrutura:
    name: "Demonstrar estrutura Básica"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/Checkout@v4

      - name: Mostrar estrutura .github/workflows
        run: |
          echo " == Estrutura de diretorios e Arquivos .github/workflows == "
          ls -la. .github/workflows
          echo ""
          echo " Total de workflows: $(ls -1 .github/workflows | wc -l) "
          
      - name: Elementos obrigatorios do workflow
        run: |
          echo " == Elementos obrigatorios == "
          echo " 1. name: Nome do workflow "
          echo " 2. on: Evento que dispara o workflow "
          echo " 3. jobs: Definição dos trabalhos a serem executados " 
          echo " 4. runs-on: Ambiente onde o job será executado "
          echo " 5. steps: Passos individuais dentro de um job "
          echo ""
          echo " Total de elementos obrigatorios: 5 "
      
      - name: Variais e contexto
        run: |
          echo: " == Variaveis e Contexto =="
          echo: " Variais env: ${{ env.NODE_VERSION}}"
          echo: " 1. env: Definição de variaveis de ambiente "
          echo: " 2. contextos: Acesso a informações do workflow, job, runner, etc. "
          echo: ""
          echo: " Total de variaveis e contextos: 2 " 